filepath: "saved_models/sweet-fog-133.pth"

tokenizer:
  filepath: "src/saved_tokenizers/updated/vocab.txt"

model:
  vocab_size: 32768
  d_model: 768
  n_heads: 12
  n_layers: 12
  xsa: False
  attn_res: False
  block_size: 8

sampling:
  use_system_prompt: true
  seq_len: 512
  temperature: 0.6
  top_k: 30
  freq_penalty: 0.8
  freq_decay: 0.99

system:
  device: cuda